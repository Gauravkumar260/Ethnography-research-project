name: CI — Lint, Type Check & Test
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - run: cd server && pnpm run lint
      - run: cd server && pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
        ports:
          - 6379:6379
    env:
      MONGODB_URI: mongodb://localhost:27017/thesis_auth_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      # - run: cd server && pnpm run test:unit
      # - run: cd server && pnpm run test:integration
      # - run: cd server && pnpm run test:security
