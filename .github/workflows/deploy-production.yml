name: Deploy to Production
on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Confirm deployment by typing "yes"'
        required: true
        default: 'no'

jobs:
  pre-deploy-checks:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm_deploy == 'yes'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: cd server && pnpm install --frozen-lockfile
      - run: cd server && pnpm audit --audit-level=high

  deploy:
    needs: pre-deploy-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/server:latest
            ghcr.io/${{ github.repository }}/server:${{ github.sha }}

      - name: Build and push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:latest
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}

      # Add step to trigger deployment on Railway/Render/Fly.io here
      # Example for Render:
      # - name: Deploy to Render
      #   run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}
