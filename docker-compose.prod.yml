# PRODUCTION OVERRIDES
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    image: ghcr.io/${GITHUB_REPOSITORY}/server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MongoDB and Redis should be managed services in production (Atlas/Upstash)
  # If self-hosting, use persistent volumes and backup strategies.
  mongodb:
    deploy:
      resources:
        limits:
          memory: 1G
  
  redis:
    deploy:
      resources:
        limits:
          memory: 256M

  mongo-express:
    deploy:
      replicas: 0 # NEVER in production
