# HOW TO START: docker compose up -d
# HOW TO SEED DB: docker compose exec server npm run seed:admin
# HOW TO VIEW LOGS: docker compose logs -f server
# HOW TO RESET ALL DATA: docker compose down -v && docker compose up -d

services:
  app:
    build: 
      context: ./client
      target: deps # Fast dev rebuilds
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - server
    command: npm run dev

  server:
    build:
      context: ./server
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    env_file: ./server/.env.local
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
    # MongoDB transactions require a replica set.
    command: mongod --replSet rs0 --bind_ip_all

  mongo-init:
    image: mongo:7
    depends_on:
      - mongodb
    restart: "no"
    command: >
      mongosh --host mongodb:27017 -u admin -p password --authenticationDatabase admin
      --eval "rs.initiate({_id:'rs0', members:[{_id:0,host:'mongodb:27017'}]})"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_URL=mongodb://admin:password@mongodb:27017/
    depends_on:
      - mongodb
    # NEVER include mongo-express in production!

volumes:
  mongo_data:
  redis_data:
